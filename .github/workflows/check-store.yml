name: Check Chrome Extension Publish Status

on:
  schedule:
    # 1시간마다 정각에 실행 (UTC 기준 0분마다)
    - cron: '0 * * * *'
  workflow_dispatch: # 수동으로 즉시 테스트해볼 수 있는 버튼 생성

permissions:
  contents: write # 리포지토리에 커밋하고 푸시할 수 있는 권한 부여

jobs:
  check-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 리포지토리 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. Node.js 환경 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Puppeteer 설치
        run: npm install puppeteer

      - name: 4. 스토어 상태 확인 (Puppeteer 스크립트 실행)
        id: check_store
        run: |
          # Node.js 스크립트를 즉석에서 생성하여 실행합니다.
          cat << 'EOF' > check.js
          const fs = require('fs');
          const puppeteer = require('puppeteer');

          (async () => {
            let browser;
            try {
              // GitHub Actions 환경에서 브라우저를 실행하기 위한 옵션
              browser = await puppeteer.launch({ args: ['--no-sandbox', '--disable-setuid-sandbox'] });
              const page = await browser.newPage();
              
              console.log("크롬 웹스토어 페이지로 이동 중...");
              // 페이지가 완전히 로드될 때까지 대기
              await page.goto('https://chromewebstore.google.com/detail/gleeofffiadklgdkffgkapnepghboajb', { 
                waitUntil: 'networkidle2',
                timeout: 60000 
              });

              // 찾고자 하는 이미지가 있는지 판별
              const isUnavailable = await page.evaluate(() => {
                const img = document.querySelector("[src='https://www.gstatic.com/chrome/webstore/images/item_not_available.png']");
                return img !== null;
              });

              await browser.close();

              // isUnavailable이 false면 게시 완료된 것(isPublished = true)
              const isPublished = !isUnavailable;
              
              // 다음 스텝(Action)으로 결과값 전달
              fs.appendFileSync(process.env.GITHUB_OUTPUT, `is_published=${isPublished}\n`);
              console.log(`게시 상태 판별 완료. (item_not_available 이미지 존재: ${isUnavailable})`);

            } catch (error) {
              console.error('페이지 확인 중 에러 발생:', error);
              if (browser) await browser.close();
              fs.appendFileSync(process.env.GITHUB_OUTPUT, `is_published=false\n`);
            }
          })();
          EOF
          
          # 생성한 스크립트 실행
          node check.js

      - name: 5. 조건 달성 시 파일 덮어쓰기 및 푸시
        # 위 스크립트에서 is_published가 'true'일 때만 아래 작업 실행
        if: steps.check_store.outputs.is_published == 'true'
        run: |
          echo "확인 결과: 익스텐션이 성공적으로 게시되었습니다. 파일 업데이트를 시작합니다."
          
          # 파일 내용 덮어쓰기
          cp extensions/auto_push_html_when_published.html extensions/index.html
          
          # Git 상태 확인 (이미 업데이트되어 변경사항이 없는 경우 에러 방지)
          if git diff --quiet extensions/index.html; then
            echo "변경된 내용이 없습니다. 이미 처리된 업데이트입니다."
            exit 0
          fi

          # Git 봇 설정 및 커밋/푸시 진행
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add extensions/index.html
          git commit -m "크롬 웹스토어 게시 완료 자동 감지 push함"
          git push
